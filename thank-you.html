<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | SufixTech</title>
  
  <!-- Favicon -->
  <link rel="icon" href="https://storage.googleapis.com/msgsndr/EOHnOtxAxO3NZV7FKamH/media/65a840b53039be5194aa0171.png" type="image/png">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="index.css">
  
  <style>
    .thank-you-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: var(--space-xl) 24px;
    }
    .thank-you-content {
      max-width: 600px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--border-radius-md);
      padding: var(--space-xl);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-top: 4px solid var(--primary-red);
    }
    .thank-you-content h1 {
      font-size: 2.5rem;
      margin-bottom: var(--space-sm);
    }
    .thank-you-content p {
      font-size: 1.1rem;
      color: var(--text-gray);
      margin-bottom: var(--space-lg);
    }
    .check-icon-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto var(--space-md);
      background: rgba(191, 6, 6, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--primary-red);
    }
    .check-icon {
      font-size: 2.5rem;
      color: var(--primary-red-glow);
    }
  </style>
</head>
<body>

  <section class="thank-you-section" id="thank-you-hero">
    <div class="thank-you-content">
      <div class="check-icon-wrapper">
        <div class="check-icon">✓</div>
      </div>
      <h1>Thank You!</h1>
      <p>Your request has been successfully submitted. One of our GoHighLevel experts will be in touch with you shortly to schedule your strategy session.</p>
      <a href="index.html" class="btn btn-primary btn-pulse">Return to Homepage</a>
    </div>
  </section>

</body>
</html>
